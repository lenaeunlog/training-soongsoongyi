  <script>
(function () {
  'use strict';

  const root = document.getElementById('root');
  const statusTitle = document.getElementById('boot-title');
  const statusText = document.getElementById('boot-text');
  const statusDetail = document.getElementById('boot-detail');

  window.__SOONGSOONGYI_GAME_BOOTED__ = false;

  function escapeHtml(value) {
    return String(value).replace(/[&<>"']/g, function (char) {
      return ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' })[char];
    });
  }

  function setStatus(title, text, detail) {
    if (statusTitle) statusTitle.textContent = title;
    if (statusText) statusText.textContent = text;
    if (statusDetail) {
      statusDetail.textContent = detail || '';
      statusDetail.hidden = !detail;
    }
  }

  function showFatalError(message) {
    if (window.__SOONGSOONGYI_GAME_BOOTED__) return;
    const safeMessage = escapeHtml(message || 'Unknown startup error');
    if (!root) return;
    root.innerHTML = `
      <main id="boot-status" role="alert">
        <section class="card error-card">
          <div class="boot-emoji">⚠️</div>
          <h1>Royal Protocol could not start</h1>
          <p>The game code loaded, but a required browser library did not.</p>
          <pre>${safeMessage}</pre>
          <p class="boot-help">Reload once. If this message remains, open the page in Chrome or Samsung Internet and check that JavaScript is enabled.</p>
        </section>
      </main>`;
  }

  window.__showSoongBootError = showFatalError;

  window.addEventListener('error', function (event) {
    if (!window.__SOONGSOONGYI_GAME_BOOTED__) {
      showFatalError(event.message || 'A required script failed to load.');
    }
  });

  window.addEventListener('unhandledrejection', function (event) {
    if (!window.__SOONGSOONGYI_GAME_BOOTED__) {
      const reason = event.reason && event.reason.message ? event.reason.message : event.reason;
      showFatalError(reason || 'A required resource failed to load.');
    }
  });

  const providers = [
    {
      name: 'cdnjs',
      react: 'https://cdnjs.cloudflare.com/ajax/libs/react/18.3.1/umd/react.production.min.js',
      reactDom: 'https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.3.1/umd/react-dom.production.min.js'
    },
    {
      name: 'UNPKG',
      react: 'https://unpkg.com/react@18.3.1/umd/react.production.min.js',
      reactDom: 'https://unpkg.com/react-dom@18.3.1/umd/react-dom.production.min.js'
    },
    {
      name: 'jsDelivr',
      react: 'https://cdn.jsdelivr.net/npm/react@18.3.1/umd/react.production.min.js',
      reactDom: 'https://cdn.jsdelivr.net/npm/react-dom@18.3.1/umd/react-dom.production.min.js'
    }
  ];

  function loadScript(url, timeoutMs) {
    return new Promise(function (resolve, reject) {
      const script = document.createElement('script');
      let settled = false;
      const timer = window.setTimeout(function () {
        if (settled) return;
        settled = true;
        script.remove();
        reject(new Error('Timed out while loading ' + url));
      }, timeoutMs || 10000);

      script.src = url;
      script.async = true;
      script.crossOrigin = 'anonymous';
      script.referrerPolicy = 'no-referrer';
      script.onload = function () {
        if (settled) return;
        settled = true;
        window.clearTimeout(timer);
        resolve();
      };
      script.onerror = function () {
        if (settled) return;
        settled = true;
        window.clearTimeout(timer);
        script.remove();
        reject(new Error('Failed to load ' + url));
      };
      document.head.appendChild(script);
    });
  }

  function clearReactGlobals() {
    try { delete window.React; } catch (_) { window.React = undefined; }
    try { delete window.ReactDOM; } catch (_) { window.ReactDOM = undefined; }
  }

  async function loadReactWithFallback() {
    const failures = [];
    for (let index = 0; index < providers.length; index += 1) {
      const provider = providers[index];
      setStatus(
        'Loading the Royal Protocol…',
        'Connecting to ' + provider.name + ' (' + (index + 1) + '/' + providers.length + ')',
        failures.length ? failures[failures.length - 1] : ''
      );
      clearReactGlobals();
      try {
        await loadScript(provider.react, 9000);
        if (!window.React || typeof window.React.createElement !== 'function') {
          throw new Error(provider.name + ' returned an invalid React file.');
        }
        await loadScript(provider.reactDom, 9000);
        if (!window.ReactDOM || (typeof window.ReactDOM.createRoot !== 'function' && typeof window.ReactDOM.render !== 'function')) {
          throw new Error(provider.name + ' returned an invalid ReactDOM file.');
        }
        return provider.name;
      } catch (error) {
        failures.push(provider.name + ': ' + (error && error.message ? error.message : String(error)));
      }
    }
    throw new Error('All React download sources failed.\n' + failures.join('\n'));
  }

  async function boot() {
    try {
      const provider = await loadReactWithFallback();
      setStatus('Starting the Royal Protocol…', 'React loaded through ' + provider + '.', '');
      window.__launchSoongsoongyiGame();
    } catch (error) {
      showFatalError(error && error.message ? error.message : String(error));
    }
  }

  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', boot, { once: true });
  } else {
    boot();
  }
})();
</script>
